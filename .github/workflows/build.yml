name: Build

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image_name: pysergio/chibi
            tag_prefix: ""
          - dockerfile: agent.Dockerfile
            image_name: pysergio/chibi
            tag_prefix: "agent-"
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.image_name }}
          tags: |
            type=schedule,prefix=${{ matrix.tag_prefix }}
            type=ref,event=branch,prefix=${{ matrix.tag_prefix }}
            type=ref,event=pr,prefix=${{ matrix.tag_prefix }}
            type=semver,pattern={{version}},prefix=${{ matrix.tag_prefix }}
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.tag_prefix }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64/v8
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image_name }}:${{ matrix.tag_prefix }}buildcache
          cache-to: type=registry,ref=${{ matrix.image_name }}:${{ matrix.tag_prefix }}buildcache,mode=max
